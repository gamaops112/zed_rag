name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allow manual trigger

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      go_changed: ${{ steps.check.outputs.go_changed }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for relevant file changes
        id: check
        run: |
          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger — always release
            DIFF="forced"
          elif [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git rev-parse "$BEFORE" &>/dev/null; then
            # Initial push or before SHA unavailable — check all files in HEAD
            DIFF=$(git show --name-only --format="" "$SHA" | grep -E '\.go$|^install\.sh$|^setup\.sh$|^docs/' || true)
          else
            # Check all files changed across the entire push range
            DIFF=$(git diff --name-only "$BEFORE" "$SHA" | grep -E '\.go$|^install\.sh$|^setup\.sh$|^docs/' || true)
          fi

          if [ -n "$DIFF" ]; then
            echo "go_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No relevant files changed, skipping release"
            echo "go_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next semver tag
        id: version
        if: steps.check.outputs.go_changed == 'true'
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $VERSION"

  release:
    needs: check-changes
    if: needs.check-changes.outputs.go_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o zed-rag-linux-amd64 \
            .

      - name: Inject VERSION and REPO into scripts and docs
        env:
          VERSION: ${{ needs.check-changes.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          sed -i "s/__VERSION__/$VERSION/g" install.sh
          sed -i "s|__REPO__|$REPO|g" install.sh
          sed -i "s|__REPO__|$REPO|g" docs/index.html
          sed -i "s|__REPO__|$REPO|g" README.md

      - name: Verify injections
        run: |
          grep -q '__REPO__'    install.sh && { echo "ERROR: REPO injection failed in install.sh";    exit 1; } || echo "install.sh REPO   ✓"
          grep -q '__VERSION__' install.sh && { echo "ERROR: VERSION injection failed in install.sh"; exit 1; } || echo "install.sh VERSION ✓"
          grep -q '__REPO__'    docs/index.html && { echo "ERROR: REPO injection failed in docs/index.html"; exit 1; } || echo "docs/index.html   ✓"

      - name: Commit updated docs back to repo
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.check-changes.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html README.md
          git diff --cached --quiet || git commit -m "docs: inject repo and version $VERSION [skip ci]"
          git push origin main

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check-changes.outputs.version }}
          name: "zed-rag ${{ needs.check-changes.outputs.version }}"
          body: "Auto release ${{ needs.check-changes.outputs.version }}"
          files: |
            zed-rag-linux-amd64
            install.sh
            setup.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
